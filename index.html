<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Настройки для красивого отображения на телефонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Охрименко Алёна</title>
    <style>
        /* Это простые стили, чтобы сайт выглядел аккуратно */
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;          /* Чтобы текст не растягивался на весь экран */
            margin: 0 auto;             /* Центрируем содержимое */
            padding: 20px;
            background-color: #f9f9ff;
            color: #1a1a2e;
            line-height: 1.5;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #eef2f6;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 0;
            color: #000;
        }
        .subtitle {
            color: #555;
            margin-top: 5px;
            font-size: 1.1rem;
        }
        .quote {
            background: #f0f0ff;
            padding: 15px 20px;
            border-radius: 16px;
            font-style: italic;
            border-left: 4px solid #b71c1c;
            margin: 20px 0;
            color: #b71c1c;
            font-weight: 500;
        }
        ul {
            list-style-type: none; /* Убираем стандартные маркеры */
            padding-left: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        li {
            background: #e6e9f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
        }
        hr {
            margin: 30px 0;
            border: none;
            border-top: 2px dotted #ddd;
        }
        .footer {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background-color: #b1c5d4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Тут вместо текста можешь позже вставить свою реальную аватарку -->
        <div class="avatar">
            😴
        </div>
        <h1>Охрименко Алёна</h1>
        <div class="subtitle">Привет! Меня зовут Алёна. Я люблю спать.</div>
        
        <div class="quote">
            «Меня не любит гит» 🤖
        </div>

        <h2>Мои увлечения</h2>
        <ul>
            <li>💻 Программирование</li>
            <li>🎱 Бильярд</li>
            <li>🎲 Настольные игры</li>
            <li>📸 Фото</li>
        </ul>
    </div>

    <div class="footer">
        Сделано с душой ❤️ | 2026
    </div>
</body>
</html>
